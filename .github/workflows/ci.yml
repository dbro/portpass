name: CI

on:
  push:
    branches: [ "main" ]
    tags: [ "*" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run tests
      run: go test -v ./pwsafe/...

  release:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    needs: test
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: pwa/package-lock.json

    - name: Copy wasm_exec.js
      run: |
        mkdir -p ./pwa/public
        cp "$(go env GOROOT)/lib/wasm/wasm_exec.js" ./pwa/public/

    - name: Build WASM
      env:
        GOOS: js
        GOARCH: wasm
      run: |
        go build -ldflags "-X github.com/dbro/portpass/pwsafe.Version=${{ github.ref_name }}" -o ./pwa/public/portpass.wasm ./cmd/wasm
        gzip ./pwa/public/portpass.wasm

    - name: Install dependencies
      working-directory: ./pwa
      run: npm ci

    - name: Install Playwright Browsers
      working-directory: ./pwa
      run: npx playwright install --with-deps

    - name: Run Playwright tests
      working-directory: ./pwa
      run: npm run test:e2e

    - name: Build PWA
      working-directory: ./pwa
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: 'pwa/dist'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v4

  fuzz:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target: [FuzzRecordTitle, FuzzRecordUsername, FuzzRecordPassword, FuzzRecordNotes, FuzzRecordEmail, FuzzRecordURL]
    steps:
    - uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'

    - name: Run Fuzz Test
      run: go test -fuzz=^${{ matrix.target }}$ -fuzztime=10s ./pwsafe
